server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/userdb
    username: postgres
    password: Anup097

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

resilience4j:
  circuitbreaker:
    instances:
      productService:
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        registerHealthIndicator: true

  retry:
    instances:
      productServiceRetry:
        maxAttempts: 3
        waitDuration: 2s

  timelimiter:
    instances:
      productService:
        timeoutDuration: 3s
